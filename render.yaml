# ==============================================================================
# Render Infrastructure as Code — Zênite PDV Staging
#
# Serviços definidos:
#   zenite-pdv-api    → Web Service   (FastAPI)   free tier c/ spin-down
#   zenite-pdv-redis  → Redis gerenciado           free tier 25MB/30d
#
# Banco de dados: Neon (externo) — NÃO provisionado aqui.
#
# Worker fiscal (ARQ): rodando LOCALMENTE em modo staging.
#   → Background Worker do Render exige plano pago (Starter $7/mês)
#   → Para rodar o worker local apontando para staging:
#       cd backend
#       # Copie backend/.env.staging.example → backend/.env.staging e preencha
#       # Depois:
#       arq app.workers.fiscal_worker.WorkerSettings
#
# Os secrets (DATABASE_URL, SECRET_KEY, CORS_ORIGINS) devem ser definidos
# manualmente no dashboard do Render (sync: false abaixo).
#
# Deploy: configure cada serviço apontando para este repositório no GitHub.
# Root Directory da API: backend
# ==============================================================================

services:

  # ----------------------------------------------------------------------------
  # Web Service — FastAPI
  # ----------------------------------------------------------------------------
  - type: web
    name: zenite-pdv-api
    runtime: python
    rootDir: backend
    buildCommand: pip install poetry==1.8.3 && poetry config virtualenvs.create false && poetry install --only main --no-root
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    plan: free
    envVars:
      # --- Python version (Render lê PYTHON_VERSION) ---
      - key: PYTHON_VERSION
        value: "3.11.9"

      # --- Aplicação ---
      - key: APP_ENV
        value: staging
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO

      # --- Banco de dados (Neon) — definido no dashboard ---
      - key: DATABASE_URL
        sync: false
      # Pool reduzido para Neon free (max ~10 conexões simultâneas)
      - key: DB_POOL_SIZE
        value: "3"
      - key: DB_MAX_OVERFLOW
        value: "5"
      - key: DB_POOL_TIMEOUT
        value: "30"

      # --- Segurança (definido no dashboard) ---
      - key: SECRET_KEY
        sync: false

      # --- CORS (definido no dashboard após obter URL do frontend Vercel) ---
      - key: CORS_ORIGINS
        sync: false

      # --- Redis (referência automática ao serviço redis abaixo) ---
      - key: REDIS_URL
        fromService:
          name: zenite-pdv-redis
          type: redis
          property: connectionString

      # --- Fiscal (sem token real em staging → usa MockGateway automaticamente) ---
      - key: FOCUS_NFE_TOKEN
        value: ""
      - key: FOCUS_NFE_BASE_URL
        value: https://homologacao.focusnfe.com.br
      - key: FOCUS_NFE_TIMEOUT
        value: "30"
      - key: FISCAL_MAX_TENTATIVAS
        value: "5"

  # ----------------------------------------------------------------------------
  # Redis — fila fiscal + blacklist de tokens
  # Free tier: 25MB RAM, dados expiram a cada 30 dias (recrie manualmente)
  # ----------------------------------------------------------------------------
  - type: redis
    name: zenite-pdv-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
