# Alembic Configuration File
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Caminho para o diretório de versões (migrations)
script_location = alembic

# Formato do nome dos arquivos de migração
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# timezone for revision timestamps (disabled - causes issues on Windows)
# timezone = UTC

# Encoding dos arquivos de migração
output_encoding = utf-8

# A variável sqlalchemy.url será lida dinamicamente via env.py (usando .env)
# Não configure aqui para evitar expor credenciais no repositório.
# sqlalchemy.url = postgresql://user:pass@localhost/dbname

[post_write_hooks]
# hooks = ruff

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
